spec: 64
name: "LP-Frost Mage SS"
author: "LP"
version: "1.1.0"
description: "V3"

entry: main

config:
  use_cooldowns:
    label: "Use CDs list (items, potion, racials, SimC opener sequencing)"
    section: "Cooldowns"
    type: checkbox
    default: true
  target_swapping:
    label: "Spellslinger — target swapping mode (SimC variable.target_swapping)"
    section: "Rotation"
    type: checkbox
    default: false
  use_defensives:
    label: "Auto-cast Ice Barrier / Ice Block"
    section: "Defensives"
    type: checkbox
    default: true
  auto_interrupt:
    label: "Auto interrupts (Counterspell / Fire Breath CC — interrupt.*.check)"
    section: "Interrupts"
    type: checkbox
    default: true
  auto_spellsteal:
    label: "Spell Steal — purgeable.list (Simia)"
    section: "Utility"
    type: checkbox
    default: true
  spellsteal_mouseover:
    label: "Spell Steal — mouseover purgeable.list"
    section: "Utility"
    type: checkbox
    default: true
  auto_remove_curse:
    label: "Auto Remove Curse"
    section: "Utility"
    type: checkbox
    default: true
  auto_arcane_intellect:
    label: "Auto Arcane Intellect (OOC self + party)"
    section: "Utility"
    type: checkbox
    default: true
  barrier_hp:
    label: "Ice Barrier refresh HP (%)"
    section: "Defensives"
    type: slider
    default: 95
    min: 50
    max: 100
  ice_block_hp:
    label: "Ice Block emergency HP (%)"
    section: "Defensives"
    type: slider
    default: 20
    min: 5
    max: 40
  rof_bank_enabled:
    label: "Ray of Frost — bank charges on trash (holds 1 charge for bosses / bursting when bank=1)"
    section: "M+ / Ray"
    type: checkbox
    default: true
  rof_bank_charges:
    label: "Ray of Frost — minimum charges kept in bank on trash (0=spend ASAP, 1=SS +15 default)"
    section: "M+ / Ray"
    type: slider
    default: 1
    min: 0
    max: 2
  rof_big_pull_min_enemies:
    label: "Ray of Frost — trash only: at or above this many enemies, ignore bank (use both charges)"
    section: "M+ / Ray"
    type: slider
    default: 5
    min: 2
    max: 8
  rof_trash_dump_ttd_sec:
    label: "Ray of Frost — trash only: if target TTD ≤ this (sec), dump Ray (ignore bank; 0 disables TTD gate)"
    section: "M+ / Ray"
    type: slider
    default: 8
    min: 0
    max: 20

variables:
  ff_trinket_timing: talent.frostfire_bolt
  ss_trinket_timing: talent.splinterstorm&(combat.time=0|fight_remains<15|prev_gcd.1.frozen_orb|cooldown.ray_of_frost.charges>=1&debuff.freezing.stack<6&!buff.fingers_of_frost.react&(icicles<3|combat.time-action.potion.last_used<25))
  target_swapping: config.target_swapping
  target_is_boss: target.boss|target.classification=worldboss|target.classification=rareelite
  rof_emergency_dump: fight_remains<15|(config.rof_trash_dump_ttd_sec>0&target.time_to_die>0&target.time_to_die<=config.rof_trash_dump_ttd_sec)
  rof_spend_ok: (!config.rof_bank_enabled)|variable.target_is_boss|variable.rof_emergency_dump|enemies_around_target>=config.rof_big_pull_min_enemies|cooldown.ray_of_frost.charges>config.rof_bank_charges

lists:
  main:
    - ice_block,range_check=none,if=player.channeling&config.use_defensives&health.pct<config.ice_block_hp&cooldown.ice_block.ready
    - return,if=player.channeling
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target_ranged
    - call_action_list,name=auto_heal
    - call_action_list,name=auto_mana
    - call_action_list,name=buffs,if=!player.combat
    - call_action_list,name=interrupts,if=config.auto_interrupt
    - call_action_list,name=auto_purge_magic,if=config.auto_spellsteal
    - call_action_list,name=dispel,if=config.auto_remove_curse
    - call_action_list,name=defensives,if=config.use_defensives
    - return,if=config.auto_combat.has(0)
    - return,if=config.auto_combat>=1&!auto_combat
    - return,if=target.dead|!target.attackable|!target.enemy
    - call_action_list,name=cooldowns,if=config.use_cooldowns
    - run_action_list,name=ff_aoe,if=talent.frostfire_bolt&enemies_around_target>=3
    - run_action_list,name=ff_st,if=talent.frostfire_bolt
    - run_action_list,name=ss_tarswap,if=variable.target_swapping
    - run_action_list,name=ss_aoe,if=enemies_around_target>=4
    - run_action_list,name=ss_st

  buffs:
    - arcane_intellect,range_check=none,if=config.auto_arcane_intellect&(!buff.arcane_intellect.up|buff.arcane_intellect.remains<300)
    - summon_water_elemental,range_check=none,if=talent.summon_water_elemental&!pet.alive
    - glacial_spike,if=!player.combat
    - frostbolt,if=!player.combat
    - arcane_intellect,delay=500,cycle=party,if=config.auto_arcane_intellect&(cycle.buff.arcane_intellect.down.any|cycle.buff.arcane_intellect.remains.any<300)
    - ice_barrier,range_check=none,if=!buff.ice_barrier.up&cooldown.ice_barrier.charges>=1

  interrupts:
    - counterspell,interrupt=true,if=interrupt.target.check
    - counterspell.mouseover,range_check=mouseover,interrupt=true,if=interrupt.mouseover.check
    - counterspell.focus,range_check=focus,interrupt=true,if=interrupt.focus.check
    - fire_breath,interrupt=true,if=interrupt.cc.check&!cooldown.counterspell.ready&target.range<=10

  auto_purge_magic:
    - return,if=!config.auto_spellsteal
    - spellsteal.mouseover,range_check=mouseover,if=config.spellsteal_mouseover&mouseover.enemy&mouseover.purgeable.list&!player.moving
    - spellsteal,if=target.purgeable.list&!player.moving

  dispel:
    - remove_curse,delay=600,range_check=none,if=player.dispelable.curse
    - remove_curse,delay=1200,cycle=party,if=cycle.dispelable.list

  defensives:
    - ice_barrier,range_check=none,if=buff.ice_barrier.down&cooldown.ice_barrier.charges>=1&health.pct<config.barrier_hp
    - ice_block,range_check=none,if=health.pct<config.ice_block_hp&cooldown.ice_block.ready

  cooldowns:
    - blood_fury,if=variable.ff_trinket_timing|variable.ss_trinket_timing
    - berserking,if=variable.ff_trinket_timing|variable.ss_trinket_timing
    - fireblood,if=variable.ff_trinket_timing|variable.ss_trinket_timing
    - ancestral_call,if=variable.ff_trinket_timing|variable.ss_trinket_timing
    - flurry,line_cd=9999,if=talent.frostfire_bolt
    - glacial_spike,line_cd=9999,if=talent.frostfire_bolt
    - flurry,line_cd=9999,if=talent.frostfire_bolt
    - ray_of_frost,line_cd=9999,if=talent.frostfire_bolt
    - frozen_orb,line_cd=9999,if=talent.frostfire_bolt
    - ice_lance,line_cd=9999,if=enemies_around_target<=3&talent.flash_freeze&talent.splinterstorm
    - ray_of_frost,line_cd=9999,if=enemies_around_target<=3&talent.splinterstorm&!variable.target_swapping
    - ray_of_frost,line_cd=9999,target_if=min:debuff.freezing.stack,if=enemies_around_target<=3&talent.splinterstorm&variable.target_swapping
    - flurry,line_cd=9999,if=enemies_around_target>=4&talent.wintertide&talent.splinterstorm&!variable.target_swapping
    - flurry,line_cd=9999,target_if=min:debuff.freezing.stack,if=enemies_around_target>=4&talent.wintertide&talent.splinterstorm&variable.target_swapping
    - frozen_orb,line_cd=9999,if=enemies_around_target>=4&talent.splinterstorm
    - ray_of_frost,line_cd=9999,if=enemies_around_target>=4&talent.splinterstorm&!variable.target_swapping
    - ray_of_frost,line_cd=9999,target_if=min:debuff.freezing.stack,if=enemies_around_target>=4&talent.splinterstorm&variable.target_swapping
    - ray_of_frost,if=fight_remains<12&!variable.target_swapping
    - ray_of_frost,target_if=min:debuff.freezing.stack,if=fight_remains<12&variable.target_swapping
    

  ff_aoe:
    - blizzard,if=buff.freezing_rain.up
    - flurry,if=buff.brain_freeze.react&buff.thermal_void.down
    - frozen_orb
    - glacial_spike
    - comet_storm
    - blizzard,if=enemies_around_target>=(5-talent.freezing_rain-talent.freezing_winds)&(cooldown.frozen_orb.remains>12*spell_haste|!talent.freezing_rain)
    - ice_lance,if=buff.fingers_of_frost.react
    - ice_lance,if=debuff.freezing.stack>=10
    - flurry,if=cooldown.flurry.ready
    - ray_of_frost,if=(!buff.frostfire_empowerment.react)&variable.rof_spend_ok
    - frostbolt
    - call_action_list,name=movement

  ff_st:
    - flurry,if=buff.brain_freeze.react&buff.thermal_void.down
    - frozen_orb
    - glacial_spike
    - comet_storm
    - ice_lance,if=buff.fingers_of_frost.react
    - ice_lance,if=debuff.freezing.stack>=10
    - flurry,if=cooldown.flurry.ready
    - ray_of_frost,if=(enemies_around_target=1|!buff.frostfire_empowerment.react)&variable.rof_spend_ok
    - frostbolt
    - call_action_list,name=movement

  movement:
   
    - blizzard,if=buff.freezing_rain.up
    - ice_lance

  ss_aoe:
    - comet_storm
    - blizzard,if=buff.freezing_rain.up
    - flurry,if=buff.brain_freeze.react&buff.thermal_void.down
    - ice_lance,if=buff.fingers_of_frost.react=2
    - frozen_orb
    - glacial_spike
    - ice_lance,if=buff.fingers_of_frost.react
    - ice_lance,if=debuff.freezing.stack>=6
    - ice_nova,if=talent.cone_of_frost
    - cone_of_cold,if=talent.cone_of_frost
    - blizzard,if=talent.freezing_winds
    - ray_of_frost,if=(icicles<3|combat.time-action.potion.last_used<25)&variable.rof_spend_ok
    - flurry,if=cooldown.flurry.ready
    - frostbolt
    - call_action_list,name=movement

  ss_st:
    - comet_storm
    - flurry,if=buff.brain_freeze.react&buff.thermal_void.down
    - ice_lance,if=buff.fingers_of_frost.react=2
    - frozen_orb
    - glacial_spike
    - ice_lance,if=buff.fingers_of_frost.react
    - ice_lance,if=debuff.freezing.stack>=6
    - ray_of_frost,if=(icicles<3|combat.time-action.potion.last_used<25)&variable.rof_spend_ok
    - flurry,if=cooldown.flurry.ready
    - frostbolt
    - call_action_list,name=movement

  ss_tarswap:
    - comet_storm
    - blizzard,if=enemies_around_target>=4&buff.freezing_rain.up
    - flurry,target_if=min:debuff.freezing.stack,if=buff.brain_freeze.react&buff.thermal_void.down
    - ice_lance,if=buff.fingers_of_frost.react=2
    - frozen_orb
    - glacial_spike,target_if=min:debuff.freezing.stack
    - ice_lance,if=buff.fingers_of_frost.react
    - ice_lance,target_if=min:debuff.freezing.stack>=6,if=enemies_around_target<=2&debuff.freezing.stack>=6
    - ice_lance,target_if=debuff.freezing.stack>=6,if=enemies_around_target>=3
    - ice_nova,if=enemies_around_target>=4&talent.cone_of_frost
    - cone_of_cold,if=enemies_around_target>=4&talent.cone_of_frost
    - blizzard,if=enemies_around_target>=4&talent.freezing_winds
    - ray_of_frost,target_if=min:debuff.freezing.stack,if=(icicles<3|combat.time-action.potion.last_used<25)&variable.rof_spend_ok
    - flurry,target_if=min:debuff.freezing.stack,if=cooldown.flurry.ready
    - frostbolt,target_if=min:debuff.freezing.stack
    - call_action_list,name=movement
