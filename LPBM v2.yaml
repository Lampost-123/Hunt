spec: 253
name: "LPBM v2"
author: "LP"
version: "3.0.6"
description: "V3."
entry: main

config:
  auto_hunters_mark:
    label: "Auto Hunter's Mark when no allied mark on nameplates"
    section: "Utility"
    type: checkbox
    default: true
  auto_misdirection:
    label: "Auto Misdirection"
    section: "Utility"
    type: checkbox
    default: true
  auto_enrage:
    label: "Auto Tranquilizing Shot (enrage & magic buffs, enemies only)"
    section: "Utility"
    type: checkbox
    default: true
  auto_freedom_enable:
    label: "Auto Master's Call (root/snare removal)"
    section: "Utility"
    type: checkbox
    default: true
  auto_interrupt:
    label: "Auto interrupts (Countershot / Intimidation — uses shared Interrupts + interrupt.*.check)"
    section: "Interrupts"
    type: checkbox
    default: true
  smart_defensives:
    label: "Smart defensives (auto-trigger by HP threshold)"
    section: "Defensives"
    type: checkbox
    default: true
  use_defensives:
    label: "Enable LP defensives"
    section: "Defensives"
    type: checkbox
    default: true
  pet_slot:
    label: "Preferred pet slot (call pet)"
    type: dropdown
    options: [{label: "Pet 1", value: 1}, {label: "Pet 2", value: 2}, {label: "Pet 3", value: 3}, {label: "Pet 4", value: 4}, {label: "Pet 5", value: 5}]
    default: 1

variables:
  wt_focus_ok: "cooldown.wild_thrash.remains>gcd+execute_time|focus>=65"
  dr_kc_gate: "(cooldown.bestial_wrath.remains>cooldown.kill_command.full_recharge_time+gcd&buff.natures_ally.react)|!apex.3"
  dr_wa_fallback: "!cooldown.kill_command.ready&!cooldown.black_arrow.ready"
  bw_ready_or_21: "cooldown.bestial_wrath.ready|fight_remains<21"
  bw_ready_or_16: "cooldown.bestial_wrath.ready|fight_remains<16"

lists:
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=pet
    - call_action_list,name=auto_target_ranged
    - call_action_list,name=interrupts,if=config.auto_interrupt
    - call_action_list,name=defensives,if=config.smart_defensives
    - call_action_list,name=lp_defensives,if=config.use_defensives
    - call_action_list,name=auto_heal
    - call_action_list,name=auto_purge_enrage,if=config.auto_enrage
    - return,if=!target.valid&!((cfg.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(cfg.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(cfg.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&cfg.auto_combat.has(0)
    - return,if=!target.valid|target.dead|!target.attackable
    - call_action_list,name=auto_hunters_mark,if=config.auto_hunters_mark
    - call_action_list,name=auto_misdirection,if=config.auto_misdirection
    - call_action_list,name=cds
    - call_action_list,name=trinkets
    - call_action_list,name=drst,if=talent.black_arrow&(active_enemies<2|!talent.beast_cleave&active_enemies<3)
    - call_action_list,name=drcleave,if=talent.black_arrow&(active_enemies>2|talent.beast_cleave&active_enemies>1)
    - call_action_list,name=st,if=!talent.black_arrow&(active_enemies<2|!talent.beast_cleave&active_enemies<3)
    - call_action_list,name=cleave,if=!talent.black_arrow&(active_enemies>2|talent.beast_cleave&active_enemies>1)

  pet:
    - revive_pet,range_check=none,if=!pet.alive&pet.exists
    - call_pet_1,range_check=none,if=!pet.alive&config.pet_slot=1
    - call_pet_2,range_check=none,if=!pet.alive&config.pet_slot=2
    - call_pet_3,range_check=none,if=!pet.alive&config.pet_slot=3
    - call_pet_4,range_check=none,if=!pet.alive&config.pet_slot=4
    - call_pet_5,range_check=none,if=!pet.alive&config.pet_slot=5
    - mend_pet,range_check=none,if=pet.alive&pet.health.pct<40&pet.buff.mend_pet.down

  defensives:
    - call_action_list,name=lp_defensives

  lp_defensives:
    - survival_of_the_fittest,range_check=none,if=player.health.pct<65&!buff.survival_of_the_fittest.up
    - exhilaration,range_check=none,if=player.health.pct<50&!buff.survival_of_the_fittest.up
    - aspect_of_the_turtle,range_check=none,if=player.health.pct<20&!buff.survival_of_the_fittest.up

  auto_hunters_mark:
    - hunters_mark,if=nameplates.debuff.hunters_mark.count=0&(target.dummy|(target.time_to_die>15&(target.boss|target.classification>3|target.npcid=243208)))

  auto_misdirection:
    - misdirection,ignore_usable=true,range_check=none,if=!buff.misdirection.up&combat.time<3

  auto_purge_enrage:
    - return,if=!config.auto_enrage
    - tranquilizing_shot.mouseover,range_check=mouseover,if=mouseover.enemy&(mouseover.purgeable.enrage|mouseover.purgeable.magic)
    - tranquilizing_shot,if=target.enemy&(target.purgeable.enrage|target.purgeable.magic)

  auto_freedom:
    - return,if=!config.auto_freedom_enable
    - masters_call,delay=500,cycle=party,if=cycle.debuff_list.freedom.up
    - masters_call,delay=500,cycle=party,if=incoming_cast.cycle.freedom.up
    - masters_call,delay=500,if=player.rooted
    - escape_artist,delay=500,if=player.rooted

  interrupts:
    - counter_shot,interrupt=true,if=interrupt.target.check
    - counter_shot.mouseover,range_check=mouseover,interrupt=true,if=mouseover.enemy&interrupt.mouseover.check
    - counter_shot.focus,range_check=focus,interrupt=true,if=interrupt.focus.check
    - intimidation,interrupt=true,if=interrupt.cc.check&pet.alive&!cooldown.counter_shot.ready

  cds:
    - berserking,if=cooldown.bestial_wrath.ready|fight_remains<13
    - blood_fury,if=var.bw_ready_or_16
    - ancestral_call,if=var.bw_ready_or_16
    - fireblood,if=cooldown.bestial_wrath.ready|fight_remains<9

  cleave:
    - barbed_shot,if=cooldown.barbed_shot.full_recharge_time<gcd
    - wild_thrash,if=talent.beast_cleave&cooldown.wild_thrash.ready
    - bestial_wrath,if=!prev_gcd.1.wild_thrash
    - wild_thrash,if=!talent.beast_cleave&cooldown.wild_thrash.ready
    - kill_command,if=buff.natures_ally.react|(talent.master_handler&(active_enemies>3|howl_summon.ready))
    - cobra_shot,if=cooldown.wild_thrash.remains>gcd&buff.hogstrider.up&active_enemies<4&var.wt_focus_ok
    - barbed_shot
    - cobra_shot,if=((talent.beast_cleave&cooldown.wild_thrash.remains>gcd)|!talent.beast_cleave)&var.wt_focus_ok

  drcleave:
    - black_arrow,if=buff.beast_cleave.remains<gcd&enemies_around_target>1
    - bestial_wrath,if=buff.beast_cleave.remains&buff.bestial_wrath.down
    - wild_thrash
    - kill_command,if=var.dr_kc_gate
    - wailing_arrow,if=buff.bestial_wrath.up&var.dr_wa_fallback
    - barbed_shot,if=cooldown.barbed_shot.full_recharge_time<1*gcd
    - black_arrow,if=buff.withering_fire.up
    - wailing_arrow,if=buff.bestial_wrath.up&buff.withering_fire.remains<action.wailing_arrow.execute_time+gcd
    - barbed_shot
    - black_arrow
    - wailing_arrow,if=buff.bestial_wrath.up&buff.withering_fire.remains
    - cobra_shot,if=var.wt_focus_ok

  drst:
    - black_arrow,if=buff.beast_cleave.remains<gcd&enemies_around_target>1
    - barbed_shot,if=(talent.bloody_frenzy&talent.snakeskin_quiver&talent.jagged_wounds)&cooldown.bestial_wrath.remains<2*gcd
    - bestial_wrath,if=buff.bestial_wrath.down
    - black_arrow,if=buff.withering_fire.up&cooldown.kill_command.full_recharge_time>gcd
    - kill_command,if=var.dr_kc_gate
    - wailing_arrow,if=buff.bestial_wrath.up&(var.dr_wa_fallback|time_to_die<action.wailing_arrow.execute_time+gcd)
    - cobra_shot,if=talent.killer_cobra&buff.bestial_wrath.up&cooldown.barbed_shot.charges_fractional<1.4
    - black_arrow
    - barbed_shot
    - cobra_shot,if=cooldown.kill_command.remains>gcd|buff.natures_ally.down

  st:
    - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
    - bestial_wrath
    - wild_thrash,if=active_enemies>1&cooldown.wild_thrash.ready
    - kill_command,if=(cooldown.bestial_wrath.remains>cooldown.kill_command.full_recharge_time+gcd&(buff.natures_ally.react|howl_summon.ready))|!apex.3
    - barbed_shot,if=((focus<75|cooldown.barbed_shot.full_recharge_time<gcd)&!talent.serpentine_strikes)|talent.serpentine_strikes
    - cobra_shot,if=cooldown.bestial_wrath.remains>gcd

  trinkets:
   #TODO: add trinkets
