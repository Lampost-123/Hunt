spec: 254
name: "LP - Marksmanship Hunter (SimC)"

movement_allowed: true

spell_overrides:
  aimed_shot: "(!player.moving|buff.lock_and_load.up)&!player.casting.19434&!player.channeling&!prev_gcd.1.aimed_shot&(lastcast.aimed_shot>1.5|lastcast.arcane_shot<lastcast.aimed_shot|lastcast.multishot<lastcast.aimed_shot)"
  rapid_fire: "!player.casting.19434"

config:
  hero_path:
    section: "Hero Specialization"
    type: dropdown
    options:
      - label: "Auto (Detect from Talents)"
        value: auto
      - label: "Dark Ranger"
        value: dark_ranger
      - label: "Sentinel"
        value: sentinel
    default: 0

  cleave_threshold:
    section: "Cleave / AOE Targets"
    type: slider
    min: 2
    max: 8
    value: 3

  auto_defense:
    section: "Auto Defensives"
    type: checkbox
    value: true


variables:
  is_dark_ranger: talent.black_arrow
  is_sentinel: talent.sentinel

  use_dark_ranger: (cfg.hero_path=auto&var.is_dark_ranger)|(cfg.hero_path=dark_ranger)
  use_sentinel: (cfg.hero_path=auto&var.is_sentinel)|(cfg.hero_path=sentinel)

  use_aoe: state.aoe&active_enemies>cfg.cleave_threshold

  trueshot_ready: (!talent.bullseye)|(fight_remains>130)|(buff.bullseye.stack=8)|(fight_remains<25)

  precise_shots_expected: buff.precise_shots.up|player.casting.19434|(player.channeling&talent.no_scope)|(lastcast.aimed_shot<1.5&lastcast.aimed_shot<lastcast.arcane_shot)

  cd_used: prev_gcd.1.volley|prev_gcd.1.trueshot|(lastcast.volley<lastcast.aimed_shot&lastcast.volley<lastcast.rapid_fire)|(lastcast.trueshot<lastcast.aimed_shot&lastcast.trueshot<lastcast.rapid_fire)

lists:
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    - call_action_list,name=defensives,if=config.auto_defense
    - call_action_list,name=interrupts
    - call_action_list,name=cooldowns,if=!player.casting&!player.channeling
    - call_action_list,name=trinkets,if=!player.casting&!player.channeling
    # - call_action_list,name=dark_ranger_aoe,if=!player.casting&!player.channeling&var.use_dark_ranger&var.use_aoe
    # - call_action_list,name=dark_ranger_st,if=!player.casting&!player.channeling&var.use_dark_ranger&!var.use_aoe
    - call_action_list,name=sentinel_aoe,if=!player.casting&!player.channeling&var.use_sentinel&var.use_aoe
    - call_action_list,name=sentinel_st,if=!player.casting&!player.channeling&var.use_sentinel&!var.use_aoe

  defensives:
    - survival_of_the_fittest.player,range_check=none,if=player.health.pct<65
    - exhilaration.player,range_check=none,if=player.health.pct<50&!buff.survival_of_the_fittest.up
    - aspect_of_the_turtle.player,range_check=none,if=player.health.pct<20&!buff.survival_of_the_fittest.up

  cooldowns:
    - berserking,if=buff.trueshot.up|fight_remains<13
    - blood_fury,if=buff.trueshot.up|(cooldown.trueshot.remains>30)|(fight_remains<16)
    - fireblood,if=buff.trueshot.up|(cooldown.trueshot.remains>30)|(fight_remains<9)
    - ancestral_call,if=buff.trueshot.up|(cooldown.trueshot.remains>30)|(fight_remains<16)
    - lights_judgment,if=buff.trueshot.down
    - #combat_potion,if=buff.trueshot.up&(buff.bloodlust.up|(fight_remains<90))

  trinkets:
    - trinket_1,if=state.cds&trinket_1.ready&(buff.trueshot.up|(cooldown.trueshot.remains<2)|(cooldown.trueshot.remains>45))
    - trinket_2,if=state.cds&trinket_2.ready&(buff.trueshot.up|(cooldown.trueshot.remains<2)|(cooldown.trueshot.remains>45))

  dark_ranger_aoe:
    - black_arrow,if=buff.black_arrow.up
    - trueshot,if=state.cds&!var.cd_used&!buff.double_tap.up
    - multishot,if=!talent.aspect_of_the_hydra&(var.precise_shots_expected|buff.trick_shots.down)
    - arcane_shot,if=talent.aspect_of_the_hydra&var.precise_shots_expected
    - rapid_fire,if=!var.precise_shots_expected&talent.unload&((talent.no_scope&buff.bulletstorm.stack<10)|target.health.pct<20)
    - rapid_fire,if=!var.precise_shots_expected&buff.bulletstorm.remains<2.5
    # - volley,if=state.cds&!var.cd_used&!buff.precise_shots.up&!buff.double_tap.up&cooldown.aimed_shot.charges_fractional>=1&one_button_assistant.Volley
    - aimed_shot,if=!var.precise_shots_expected
    - wailing_arrow,if=buff.wailing_arrow.up
    - rapid_fire,if=!var.precise_shots_expected
    - steady_shot,if=!player.moving
    - steady_shot,ignore_movement=true,if=player.moving.time>0.3

  dark_ranger_st:
    - black_arrow,if=buff.black_arrow.up
    - trueshot,if=state.cds&!var.cd_used&!buff.double_tap.up
    - rapid_fire,if=!var.precise_shots_expected&talent.unload&((talent.no_scope&buff.bulletstorm.stack<10)|target.health.pct<20)
    - arcane_shot,if=var.precise_shots_expected
    - rapid_fire,if=!var.precise_shots_expected&buff.bulletstorm.remains<2.5
    # - volley,if=state.cds&!var.cd_used&!buff.precise_shots.up&!buff.double_tap.up&cooldown.aimed_shot.charges_fractional>=1&one_button_assistant.Volley
    - aimed_shot,if=!var.precise_shots_expected
    - wailing_arrow,if=buff.wailing_arrow.up
    - rapid_fire,if=!var.precise_shots_expected
    - steady_shot,if=!player.moving
    - steady_shot,ignore_movement=true,if=player.moving.time>0.3

  sentinel_aoe:
    - multishot,if=!talent.aspect_of_the_hydra&(var.precise_shots_expected|buff.trick_shots.down)
    - arcane_shot,if=talent.aspect_of_the_hydra&var.precise_shots_expected|player.casting.19434
    - rapid_fire,if=!var.precise_shots_expected&buff.bulletstorm.down
    - trueshot,if=state.cds&!var.cd_used&!buff.double_tap.up
    - one_button_assist,if=state.cds&!var.cd_used&!buff.precise_shots.up&!buff.double_tap.up&cooldown.aimed_shot.charges_fractional>=1&one_button_assistant.volley
    #- moonlight_chakram,ignore_cooldown=true,if=buff.trueshot.up&(focus<35)
    - aimed_shot,if=!var.precise_shots_expected
    - rapid_fire,if=!var.precise_shots_expected
    - steady_shot,if=!player.moving
    - steady_shot,ignore_movement=true,if=player.moving.time>0.3

  sentinel_st:
    - one_button_assist,if=state.cds&!var.cd_used&!buff.precise_shots.up&!buff.double_tap.up&cooldown.aimed_shot.charges_fractional>=1&one_button_assistant.volley
    - trueshot,if=state.cds&!var.cd_used&!buff.double_tap.up
    #- moonlight_chakram,ignore_cooldown=true,if=buff.trueshot.up&(focus<35)
    - rapid_fire,if=!var.precise_shots_expected&talent.unload&((talent.no_scope&buff.bulletstorm.stack<10)|target.health.pct<20)
    - arcane_shot,if=var.precise_shots_expected|player.casting.19434
    - rapid_fire,if=!var.precise_shots_expected&buff.bulletstorm.remains<2.5
    - trueshot,ignore_cooldown=true,if=buff.trueshot.up&(cooldown.aimed_shot.charges_fractional<1.2|focus<35)
    - aimed_shot,if=!var.precise_shots_expected
    - rapid_fire,if=!var.precise_shots_expected
    - steady_shot,if=!player.moving
    - steady_shot,ignore_movement=true,if=player.moving.time>0.3

  interrupts:
    - counter_shot,if=target.casting.interruptible
    - intimidation,if=target.casting.interruptible&!cooldown.counter_shot.ready