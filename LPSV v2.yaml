spec: 255
name: "LP-Survival Hunter v2 (12.0.5)"
author: "LPSV"
version: "3.0.0-simple"
description: "yeet"

entry: main

config:
  use_cooldowns:
    label: "Use major cooldowns (racials + Aspect — see cds)"
    section: "Cooldowns"
    type: checkbox
    default: true
  use_racials:
    label: "Use damage racials (requires takedown_window in cds)"
    section: "Cooldowns"
    type: checkbox
    default: true
  use_aspect_of_the_eagle:
    label: "Aspect of the Eagle when target is out of melee (range >= 6)"
    section: "Cooldowns"
    type: checkbox
    default: true
  boomstick_min_ttd:
    label: "Boomstick ST — min target TTD (boss / training dummy bypass)"
    section: "Rotation"
    type: slider
    default: 25
    min: 0
    max: 120
  boomstick_max_range_yards:
    label: "Boomstick cast range during Aspect of the Eagle (melee Boomstick stays ≤ 6)"
    section: "Rotation"
    type: slider
    default: 18
    min: 12
    max: 20
  boomstick_aoe_chim:
    label: "chim"
    section: "Rotation"
    type: checkbox
    default: false
  auto_interrupt:
    label: "Auto interrupts"
    section: "Interrupts"
    type: checkbox
    default: true
  auto_enrage:
    label: "Auto Tranquilizing Shot"
    section: "Utility"
    type: checkbox
    default: true
  auto_freedom_enable:
    label: "Auto Master's Call / Escape Artist"
    section: "Utility"
    type: checkbox
    default: true
  smart_defensives:
    label: "Smart defensives (HP-triggered)"
    section: "Defensives"
    type: checkbox
    default: true
  use_defensives:
    label: "Enable LP-style defensives"
    section: "Defensives"
    type: checkbox
    default: true
  sotf_hp:
    label: "Survival of the Fittest HP %"
    section: "Defensives"
    type: slider
    default: 65
    min: 20
    max: 90
  auto_hunters_mark:
    label: "Auto Hunters Mark"
    section: "Utility"
    type: checkbox
    default: true
  exhilaration_hp:
    label: "Exhilaration HP %"
    section: "Defensives"
    type: slider
    default: 50
    min: 10
    max: 80
  turtle_hp:
    label: "Aspect of the Turtle HP % (emergency)"
    section: "Defensives"
    type: slider
    default: 20
    min: 5
    max: 50
  call_pet_number:
    label: "Preferred pet slot"
    section: "Pet"
    type: dropdown
    options:
      - {label: "Pet 1", value: 1}
      - {label: "Pet 2", value: 2}
      - {label: "Pet 3", value: 3}
      - {label: "Pet 4", value: 4}
      - {label: "Pet 5", value: 5}
    default: 1

variables:
  hopl_any_up: "buff.howl_of_the_pack_leader.up"
  tip_stack_low: "buff.tip_of_the_spear.stack<2"
  takedown_window: "(buff.takedown.up|cooldown.takedown.ready)"
  boomstick_aoe_chim_ok: "(config.boomstick_aoe_chim&enemies_around_target>=2)|(!config.boomstick_aoe_chim)"
  boomstick_pl_targets_ok: "enemies_around_target>=2|target.boss|target.time_to_die>27"
  plcleave_raptor_filler_ok: "cooldown.boomstick.remains>=action.boomstick.execute_time|focus>=80"
  boomstick_ttd_ok: "target.time_to_die=0|target.time_to_die>=config.boomstick_min_ttd|target.npcid=243208|target.boss"
  takedown_ttd_ok: "target.boss|target.npcid=243208|target.time_to_die=0|target.time_to_die>=config.boomstick_min_ttd"
  takedown_sync_stacks: "(talent.howl_of_the_pack_leader&((buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs))|(buff.tip_of_the_spear.stack=0&talent.twin_fangs)))|(!talent.howl_of_the_pack_leader&((buff.tip_of_the_spear.stack>0&(!talent.twin_fangs))|(buff.tip_of_the_spear.stack=0&talent.twin_fangs)))"
  boomstick_sync_hold: "talent.takedown&state.cds&variable.takedown_ttd_ok&(cooldown.boomstick.ready|cooldown.boomstick.remains<=cooldown.takedown.remains+10)&((cooldown.takedown.remains>0&cooldown.takedown.remains<=10)|(cooldown.takedown.ready&variable.takedown_sync_stacks))"
  boomstick_in_cast_range: "(target.range<=6)|(buff.aspect_of_the_eagle.up&target.range<=config.boomstick_max_range_yards)"
  sotf_blocking: "!buff.survival_of_the_fittest.up"

lists:
  main:
    - return,if=player.channeling
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=pet
    - call_action_list,name=auto_target_ranged
    - call_action_list,name=precombat,if=!player.combat
    - call_action_list,name=interrupts,if=config.auto_interrupt
    - call_action_list,name=defensives,if=config.smart_defensives|config.use_defensives
    - call_action_list,name=auto_heal
    - return,if=!target.valid&!((cfg.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(cfg.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(cfg.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&cfg.auto_combat.has(0)
    - return,if=!target.valid|target.dead|!target.attackable|!target.enemy
    - call_action_list,name=auto_hunters_mark,if=config.auto_hunters_mark
    - call_action_list,name=cds,if=config.use_cooldowns
    - call_action_list,name=plst,if=active_enemies<3&talent.howl_of_the_pack_leader
    - call_action_list,name=plcleave,if=active_enemies>2&talent.howl_of_the_pack_leader
    - call_action_list,name=sentst,if=active_enemies<3&!talent.howl_of_the_pack_leader
    - call_action_list,name=sentcleave,if=active_enemies>2&!talent.howl_of_the_pack_leader

  precombat:

  pet:
    - revive_pet,range_check=none,if=!pet.alive&pet.exists
    - 883,range_check=none,if=!pet.exists&config.call_pet_number=1
    - 83242,range_check=none,if=!pet.exists&config.call_pet_number=2
    - 83243,range_check=none,if=!pet.exists&config.call_pet_number=3
    - 83244,range_check=none,if=!pet.exists&config.call_pet_number=4
    - 83245,range_check=none,if=!pet.exists&config.call_pet_number=5
    - mend_pet,range_check=none,if=pet.alive&pet.health.pct<40&pet.buff.mend_pet.down

  defensives:
    - call_action_list,name=lp_defensives

  lp_defensives:
    - survival_of_the_fittest,range_check=none,if=player.health.pct<config.sotf_hp&variable.sotf_blocking
    - exhilaration,range_check=none,if=player.health.pct<config.exhilaration_hp&variable.sotf_blocking
    - aspect_of_the_turtle,range_check=none,if=player.health.pct<config.turtle_hp&variable.sotf_blocking

  auto_purge_enrage:
    - return,if=!config.auto_enrage
    - tranquilizing_shot.mouseover,range_check=mouseover,if=mouseover.enemy&(mouseover.purgeable.enrage|mouseover.purgeable.magic)
    - tranquilizing_shot,if=target.enemy&(target.purgeable.enrage|target.purgeable.magic)

  auto_hunters_mark:
    - hunters_mark,if=nameplates.debuff.hunters_mark.count=0&((target.time_to_die>15&(target.boss|target.classification>3|target.npcid=243208)))

  auto_freedom:
    - return,if=!config.auto_freedom_enable
    - masters_call,delay=500,cycle=party,if=cycle.debuff_list.freedom.up
    - masters_call,delay=500,cycle=party,if=incoming_cast.cycle.freedom.up
    - masters_call,delay=500,if=player.rooted
    - escape_artist,delay=500,if=player.rooted

  interrupts:
    - muzzle,interrupt=true,if=interrupt.target.check
    - muzzle.mouseover,range_check=mouseover,interrupt=true,if=interrupt.mouseover.check
    - muzzle.focus,range_check=focus,interrupt=true,if=interrupt.focus.check
    - intimidation,interrupt=true,if=interrupt.cc.check&pet.alive&!cooldown.muzzle.ready

  cds:
    - blood_fury,if=config.use_racials&variable.takedown_window
    - ancestral_call,if=config.use_racials&variable.takedown_window
    - fireblood,if=config.use_racials&variable.takedown_window
    - berserking,if=config.use_racials&variable.takedown_window
    - aspect_of_the_eagle,if=config.use_aspect_of_the_eagle&target.range>=6

  plcleave:
    - kill_command,if=!prev_gcd.1.kill_command&buff.tip_of_the_spear.stack<2&variable.hopl_any_up
    - kill_command,if=!prev_gcd.1.kill_command&cooldown.takedown.remains<gcd&buff.tip_of_the_spear.stack<2&!talent.twin_fangs
    - takedown,if=state.cds&((buff.tip_of_the_spear.stack>0&!talent.twin_fangs)|(buff.tip_of_the_spear.stack=0&talent.twin_fangs))
    - flamefang_pitch
    - wildfire_bomb,if=cooldown.wildfire_bomb.full_recharge_time<gcd&(!cooldown.boomstick.ready)
    - boomstick,if=buff.tip_of_the_spear.up&variable.boomstick_in_cast_range&variable.boomstick_pl_targets_ok&variable.boomstick_aoe_chim_ok&fight_remains>8
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(!cooldown.boomstick.ready)
    - raptor_strike,if=(buff.tip_of_the_spear.up|!buff.raptor_swipe.up&(!cooldown.boomstick.ready))&variable.plcleave_raptor_filler_ok
    - kill_command,if=!prev_gcd.1.kill_command&cooldown.takedown.remains&buff.tip_of_the_spear.stack<2
    - wildfire_bomb,if=(!cooldown.boomstick.ready)

  plst:
    - kill_command,if=!prev_gcd.1.kill_command&buff.tip_of_the_spear.stack<2&variable.hopl_any_up
    - kill_command,if=!prev_gcd.1.kill_command&cooldown.takedown.remains<gcd&buff.tip_of_the_spear.stack<2&!talent.twin_fangs
    - takedown,if=state.cds&((buff.tip_of_the_spear.stack>0&!talent.twin_fangs)|(buff.tip_of_the_spear.stack=0&talent.twin_fangs))
    - flamefang_pitch
    - wildfire_bomb,if=cooldown.wildfire_bomb.full_recharge_time<gcd&((talent.lethal_calibration&cooldown.wildfire_bomb.full_recharge_time<4+gcd)|!talent.lethal_calibration)&!cooldown.boomstick.ready
    - boomstick,if=buff.tip_of_the_spear.up&variable.boomstick_in_cast_range&variable.boomstick_pl_targets_ok&variable.boomstick_aoe_chim_ok
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(!cooldown.boomstick.ready)
    - raptor_strike,if=buff.tip_of_the_spear.up|!buff.raptor_swipe.up
    - kill_command,if=!prev_gcd.1.kill_command&cooldown.takedown.remains&buff.tip_of_the_spear.stack<2
    - wildfire_bomb,if=!cooldown.boomstick.ready

  sentcleave:
    - takedown,if=(buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs)|buff.tip_of_the_spear.stack=0&talent.twin_fangs)&state.cds&target.range<=8&variable.takedown_ttd_ok
    - boomstick,if=buff.tip_of_the_spear.up&variable.boomstick_in_cast_range&variable.boomstick_aoe_chim_ok
    - kill_command,if=buff.tip_of_the_spear.stack=0
    - takedown,if=(buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs)|buff.tip_of_the_spear.stack=0&talent.twin_fangs)&state.cds&target.range<=8&variable.takedown_ttd_ok
    - boomstick,if=buff.tip_of_the_spear.up&variable.boomstick_in_cast_range&variable.boomstick_aoe_chim_ok
    - kill_command,if=buff.tip_of_the_spear.stack=1&variable.hopl_any_up&(!talent.twin_fangs)
    - wildfire_bomb,if=talent.wildfire_shells&buff.tip_of_the_spear.up&(!debuff.sentinels_mark.remains)&cooldown.boomstick.remains<11&cooldown.boomstick.remains>1
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(debuff.sentinels_mark.remains|cooldown.wildfire_bomb.full_recharge_time<4+gcd)
    - kill_command,if=cooldown.takedown.remains<gcd&variable.tip_stack_low&(!talent.twin_fangs)
    - takedown,if=(buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs)|buff.tip_of_the_spear.stack=0&talent.twin_fangs)&state.cds&target.range<=8
    - moonlight_chakram,if=buff.tip_of_the_spear.up
    - flamefang_pitch,if=talent.flamefang_pitch&buff.tip_of_the_spear.up
    - raptor_strike,if=(buff.tip_of_the_spear.up&buff.raptor_swipe.up)|(!buff.raptor_swipe.up)
    - takedown,if=state.cds&target.range<=8
    - kill_command

  sentst:
    - kill_command,if=buff.tip_of_the_spear.stack=0&(cooldown.takedown.remains|(!talent.twin_fangs))
    - boomstick,if=buff.tip_of_the_spear.up&(!cooldown.takedown.ready)&(!debuff.sentinels_mark.remains)&variable.boomstick_ttd_ok&(!variable.boomstick_sync_hold)&variable.boomstick_in_cast_range&variable.boomstick_aoe_chim_ok
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(debuff.sentinels_mark.remains|cooldown.wildfire_bomb.full_recharge_time<4+gcd)
    - kill_command,if=cooldown.takedown.remains<gcd&variable.tip_stack_low&(!talent.twin_fangs)
    - takedown,if=(buff.tip_of_the_spear.stack>0&(!talent.twin_fangs)|buff.tip_of_the_spear.stack=0&talent.twin_fangs)&state.cds&variable.takedown_ttd_ok&target.range<=8
    - boomstick,if=buff.tip_of_the_spear.up&variable.boomstick_in_cast_range&variable.boomstick_aoe_chim_ok
    - moonlight_chakram,if=buff.tip_of_the_spear.up
    - flamefang_pitch
    - raptor_strike,if=buff.tip_of_the_spear.up|(!buff.raptor_swipe.up)
    - kill_command,if=cooldown.takedown.remains
    - takedown,if=state.cds&variable.takedown_ttd_ok&target.range<=8
