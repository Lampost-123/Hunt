spec: 255
name: "LP-Survival Hunter (SimC default, Midnight)"
author: "LPSurvival"
version: "2.0.15"
description: "LP-Survival Hunter (PL)."

entry: main

config:
  use_cooldowns:
    label: "Use major cooldowns (racials, Aspect of the Eagle)"
    section: "Cooldowns"
    type: checkbox
    default: true
  use_racials:
    label: "Use damage racials"
    section: "Cooldowns"
    type: checkbox
    default: true
  use_aspect_of_the_eagle:
    label: "Aspect of the Eagle when target is out of melee (>=10y)"
    section: "Cooldowns"
    type: checkbox
    default: true
  aoe_threshold:
    label: "AoE cutover (>= N enemies around target → cleave lists)"
    section: "Rotation"
    type: slider
    default: 2
    min: 2
    max: 8
  boomstick_min_ttd:
    label: "Sentinel / filler — min target TTD (boss & dungeon crab NPC bypass); drives variable.takedown_ttd_ok only"
    section: "Rotation"
    type: slider
    default: 25
    min: 0
    max: 120
  boomstick_aoe_chim:
    label: "Boomstick only in AOE Chim Boss" 
    section: "Rotation"
    type: checkbox
    default: false
  boomstick_aoe_chim_min_enemies:
    label: "Boomstick AoE Chimaera — min enemies around target (when mode above is on)"
    section: "Rotation"
    type: slider
    default: 2
    min: 1
    max: 8
  boomstick_max_range_yards:
    label: "Boomstick — max cast range (yards); lower = safer cleave overlap, raise toward 20 when needed"
    section: "Rotation"
    type: slider
    default: 18
    min: 12
    max: 20

  auto_interrupt:
    label: "Auto interrupts"
    section: "Interrupts"
    type: checkbox
    default: true
  auto_enrage:
    label: "Auto Tranquilizing Shot"
    section: "Utility"
    type: checkbox
    default: true
  auto_freedom_enable:
    label: "Auto Master's Call"
    section: "Utility"
    type: checkbox
    default: true
  smart_defensives:
    label: "Smart defensives (HP-triggered)"
    section: "Defensives"
    type: checkbox
    default: true
  use_defensives:
    label: "Enable LP-style defensives"
    section: "Defensives"
    type: checkbox
    default: true
  sotf_hp:
    label: "Survival of the Fittest HP %"
    section: "Defensives"
    type: slider
    default: 65
    min: 20
    max: 90
  auto_hunters_mark:
    label: "Auto Hunters Mark"
    section: "Utility"
    type: checkbox
    default: true
  exhilaration_hp:
    label: "Exhilaration HP %"
    section: "Defensives"
    type: slider
    default: 50
    min: 10
    max: 80
  turtle_hp:
    label: "Aspect of the Turtle HP % (emergency)"
    section: "Defensives"
    type: slider
    default: 20
    min: 5
    max: 50
  call_pet_number:
    label: "Preferred pet slot"
    section: "Pet"
    type: dropdown
    options:
      - {label: "Pet 1", value: 1}
      - {label: "Pet 2", value: 2}
      - {label: "Pet 3", value: 3}
      - {label: "Pet 4", value: 4}
      - {label: "Pet 5", value: 5}
    default: 1

variables:
  route_cleave: "enemies_around_target>=config.aoe_threshold"
  route_st: "enemies_around_target<config.aoe_threshold|!state.aoe"
  hopl_any_up: "buff.472325.up|buff.471878.up|buff.472324.up"
  tip_stack_low: "buff.tip_of_the_spear.stack<2"
  takedown_window: "(buff.takedown.up|cooldown.takedown.ready)"
  boomstick_aoe_chim_ok: "(config.boomstick_aoe_chim&enemies_around_target>=config.boomstick_aoe_chim_min_enemies)|(!config.boomstick_aoe_chim)"
  takedown_ttd_ok: "target.boss|target.npcid=243208|target.time_to_die=0|target.time_to_die>=config.boomstick_min_ttd"
  boomstick_in_range: "target.range<=config.boomstick_max_range_yards"

lists:
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=pet
    - call_action_list,name=auto_target_ranged
    - return,if=player.channeling
    - call_action_list,name=interrupts,if=config.auto_interrupt
    - call_action_list,name=defensives,if=config.smart_defensives|config.use_defensives
    - call_action_list,name=auto_heal
    - return,if=!target.valid&!((cfg.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(cfg.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(cfg.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&cfg.auto_combat.has(0)
    - return,if=!target.valid|target.dead|!target.attackable|!target.enemy
    - call_action_list,name=auto_hunters_mark,if=config.auto_hunters_mark
    - call_action_list,name=cds,if=config.use_cooldowns
    - call_action_list,name=plst,if=talent.howl_of_the_pack_leader&variable.route_st
    - call_action_list,name=plcleave,if=talent.howl_of_the_pack_leader&variable.route_cleave
    - call_action_list,name=sentst,if=(!talent.howl_of_the_pack_leader)&variable.route_st
    - call_action_list,name=sentcleave,if=(!talent.howl_of_the_pack_leader)&variable.route_cleave

  pet:
    - revive_pet,range_check=none,if=!pet.alive&pet.exists
    - 883,range_check=none,if=!pet.exists&config.call_pet_number=1
    - 83242,range_check=none,if=!pet.exists&config.call_pet_number=2
    - 83243,range_check=none,if=!pet.exists&config.call_pet_number=3
    - 83244,range_check=none,if=!pet.exists&config.call_pet_number=4
    - 83245,range_check=none,if=!pet.exists&config.call_pet_number=5
    - mend_pet,range_check=none,if=pet.alive&pet.health.pct<40&pet.buff.mend_pet.down

  defensives:
    - call_action_list,name=lp_defensives

  lp_defensives:
    - survival_of_the_fittest,range_check=none,if=player.health.pct<config.sotf_hp&(!buff.survival_of_the_fittest.up)
    - exhilaration,range_check=none,if=player.health.pct<config.exhilaration_hp&(!buff.survival_of_the_fittest.up)
    - aspect_of_the_turtle,range_check=none,if=player.health.pct<config.turtle_hp&(!buff.survival_of_the_fittest.up)

  auto_purge_enrage:
    - return,if=!config.auto_enrage
    - tranquilizing_shot.mouseover,range_check=mouseover,if=mouseover.enemy&(mouseover.purgeable.enrage|mouseover.purgeable.magic)
    - tranquilizing_shot,if=target.enemy&(target.purgeable.enrage|target.purgeable.magic)

  auto_hunters_mark:
    - hunters_mark,if=nameplates.debuff.hunters_mark.count=0&((target.time_to_die>15&(target.boss|target.classification>3|target.npcid=243208)))

  auto_freedom:
    - return,if=!config.auto_freedom_enable
    - masters_call,delay=500,cycle=party,if=cycle.debuff_list.freedom.up
    - masters_call,delay=500,cycle=party,if=incoming_cast.cycle.freedom.up
    - masters_call,delay=500,if=player.rooted
    - escape_artist,delay=500,if=player.rooted

  interrupts:
    - muzzle,interrupt=true,if=interrupt.target.check
    - muzzle.mouseover,range_check=mouseover,interrupt=true,if=interrupt.mouseover.check
    - muzzle.focus,range_check=focus,interrupt=true,if=interrupt.focus.check
    - intimidation,interrupt=true,if=interrupt.cc.check&pet.alive&!cooldown.muzzle.ready

  cds:
    - blood_fury,if=config.use_racials&variable.takedown_window
    - ancestral_call,if=config.use_racials&variable.takedown_window
    - fireblood,if=config.use_racials&variable.takedown_window
    - berserking,if=config.use_racials&variable.takedown_window
    - aspect_of_the_eagle,if=config.use_aspect_of_the_eagle&target.range>=10

  plcleave:
    - kill_command,if=buff.tip_of_the_spear.stack=0
    - kill_command,if=buff.tip_of_the_spear.stack=1&variable.hopl_any_up&(!talent.twin_fangs)
    - kill_command,if=cooldown.takedown.remains<gcd&variable.tip_stack_low&(!talent.twin_fangs)
    - boomstick,if=buff.tip_of_the_spear.stack>=1&variable.boomstick_in_range&variable.boomstick_aoe_chim_ok
    - takedown,if=((buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs))|(buff.tip_of_the_spear.stack=0&talent.twin_fangs))&state.cds&target.range<=8
    - flamefang_pitch,if=talent.flamefang_pitch
    - wildfire_bomb,if=(cooldown.wildfire_bomb.full_recharge_time<gcd|buff.tip_of_the_spear.up)&(!cooldown.boomstick.ready)
    - boomstick,if=buff.tip_of_the_spear.up&variable.boomstick_in_range&variable.boomstick_aoe_chim_ok
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(!cooldown.boomstick.ready)
    - raptor_strike,if=(buff.tip_of_the_spear.up|!buff.raptor_swipe.up)&(!cooldown.boomstick.ready)
    - kill_command,if=cooldown.takedown.remains
    - wildfire_bomb,if=state.cds&(!cooldown.boomstick.ready)
    - wildfire_bomb,if=(!cooldown.boomstick.ready)
    - takedown,if=state.cds&target.range<=8

  plst:
    - kill_command,if=buff.tip_of_the_spear.stack=0
    - kill_command,if=buff.tip_of_the_spear.stack=1&variable.hopl_any_up&(!talent.twin_fangs)
    - wildfire_bomb,if=talent.fury_of_the_wyvern&buff.wyverns_cry.up&buff.wyverns_cry.remains<gcd&(!cooldown.boomstick.ready)
    - kill_command,if=cooldown.takedown.remains<gcd&variable.tip_stack_low&(!talent.twin_fangs)
    - raptor_strike,if=!buff.raptor_swipe.up&cooldown.takedown.remains<gcd
    - boomstick,if=(buff.tip_of_the_spear.up|(cooldown.takedown.remains<gcd&talent.twin_fangs))&variable.boomstick_in_range&variable.boomstick_aoe_chim_ok
    - takedown,if=((buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs))|(buff.tip_of_the_spear.stack=0&talent.twin_fangs))&state.cds&target.range<=8
    - flamefang_pitch,if=talent.flamefang_pitch
    - wildfire_bomb,if=talent.fury_of_the_wyvern&buff.wyverns_cry.up&buff.tip_of_the_spear.up&(!buff.takedown.remains)&(!cooldown.boomstick.ready)
    - raptor_strike,if=buff.tip_of_the_spear.up|!buff.raptor_swipe.up
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(!cooldown.boomstick.ready)
    - kill_command,if=cooldown.takedown.remains
    - wildfire_bomb,if=(!cooldown.boomstick.ready)
    - takedown,if=state.cds&target.range<=8

  sentcleave:
    - takedown,if=(buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs)|buff.tip_of_the_spear.stack<=1&talent.twin_fangs)&state.cds&target.range<=8
    - boomstick,if=buff.tip_of_the_spear.up&variable.boomstick_in_range&variable.boomstick_aoe_chim_ok
    - kill_command,if=buff.tip_of_the_spear.stack=0
    - takedown,if=((buff.tip_of_the_spear.stack>=2&!variable.hopl_any_up&(!talent.twin_fangs))|(buff.tip_of_the_spear.stack=0&talent.twin_fangs))&state.cds&target.range<=8&variable.takedown_ttd_ok
    - kill_command,if=buff.tip_of_the_spear.stack=1&variable.hopl_any_up&(!talent.twin_fangs)
    - wildfire_bomb,if=talent.wildfire_shells&buff.tip_of_the_spear.up&(!debuff.sentinels_mark.remains)&cooldown.boomstick.remains<11&cooldown.boomstick.remains>1
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(debuff.sentinels_mark.remains|cooldown.wildfire_bomb.full_recharge_time<4+gcd)
    - kill_command,if=cooldown.takedown.remains<gcd&variable.tip_stack_low&(!talent.twin_fangs)
    - takedown,if=(buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs)|buff.tip_of_the_spear.stack=0&talent.twin_fangs)&state.cds&target.range<=8
    - moonlight_chakram,if=buff.tip_of_the_spear.up
    - flamefang_pitch,if=talent.flamefang_pitch&buff.tip_of_the_spear.up
    - raptor_strike,if=(buff.tip_of_the_spear.up&buff.raptor_swipe.up)|(!buff.raptor_swipe.up)
    - takedown,if=state.cds&target.range<=8
    - kill_command

  sentst:
    - kill_command,if=buff.tip_of_the_spear.stack=0&(cooldown.takedown.remains|(!talent.twin_fangs))
    - boomstick,if=buff.tip_of_the_spear.up&(!cooldown.takedown.ready)&(!debuff.sentinels_mark.remains)&variable.boomstick_in_range&variable.boomstick_aoe_chim_ok
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(debuff.sentinels_mark.remains|cooldown.wildfire_bomb.full_recharge_time<4+gcd)
    - kill_command,if=cooldown.takedown.remains<gcd&variable.tip_stack_low&(!talent.twin_fangs)
    - takedown,if=(buff.tip_of_the_spear.stack>0&(!talent.twin_fangs)|buff.tip_of_the_spear.stack=0&talent.twin_fangs)&state.cds&variable.takedown_ttd_ok&target.range<=8
    - boomstick,if=buff.tip_of_the_spear.up&variable.boomstick_in_range&variable.boomstick_aoe_chim_ok
    - moonlight_chakram,if=buff.tip_of_the_spear.up
    - flamefang_pitch,if=talent.flamefang_pitch
    - raptor_strike,if=buff.tip_of_the_spear.up|(!buff.raptor_swipe.up)
    - kill_command,if=cooldown.takedown.remains
    - takedown,if=state.cds&variable.takedown_ttd_ok&target.range<=8
