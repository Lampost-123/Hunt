spec: 255
name: "LP-Survival Hunter (SimC default, Midnight)"
author: "LPSurvival"
version: "2.0"
description: "LP-Survival Hunter (PL)"

entry: main

config:
  use_cooldowns:
    label: "Use major cooldowns (racials, trinkets, potion)"
    section: "Cooldowns"
    type: checkbox
    default: true
  use_racials:
    label: "Use damage racials"
    section: "Cooldowns"
    type: checkbox
    default: true
  # use_trinkets:
  #   label: "Auto use_items trinkets"
  #   section: "Cooldowns"
  #   type: checkbox
  #   default: true
  use_aspect_of_the_eagle:
    label: "Aspect of the Eagle when target is out of melee (>=10y)"
    section: "Cooldowns"
    type: checkbox
    default: true
  aoe_threshold:
    label: "AoE cutover (>= N enemies around target → cleave lists)"
    section: "Rotation"
    type: slider
    default: 2
    min: 2
    max: 8
  boomstick_min_ttd:
    label: "Boomstick — min target TTD ST(Bypassed for bosses)"
    section: "Rotation"
    type: slider
    default: 25
    min: 0
    max: 120
  boomstick_aoe_chim:
    label: "Boomstick only in AOE Chim Boss" 
    section: "Rotation"
    type: checkbox
    default: false
  boomstick_aoe_chim_min_enemies:
    label: "Boomstick AoE Chimaera — min enemies around target (when mode above is on)"
    section: "Rotation"
    type: slider
    default: 2
    min: 1
    max: 8
  auto_interrupt:
    label: "Auto interrupts)"
    section: "Interrupts"
    type: checkbox
    default: true
  auto_enrage:
    label: "Auto Tranquilizing Shot"
    section: "Utility"
    type: checkbox
    default: true
  auto_freedom_enable:
    label: "Auto Master's Call"
    section: "Utility"
    type: checkbox
    default: true
  smart_defensives:
    label: "Smart defensives (HP-triggered)"
    section: "Defensives"
    type: checkbox
    default: true
  use_defensives:
    label: "Enable LP-style defensives"
    section: "Defensives"
    type: checkbox
    default: true
  sotf_hp:
    label: "Survival of the Fittest HP %"
    section: "Defensives"
    type: slider
    default: 65
    min: 20
    max: 90
  auto_hunters_mark:
    label: "Auto Hunters Mark"
    section: "Utilities"
    type: checkbox
    default: true
  exhilaration_hp:
    label: "Exhilaration HP %"
    section: "Defensives"
    type: slider
    default: 50
    min: 10
    max: 80
  turtle_hp:
    label: "Aspect of the Turtle HP % (emergency)"
    section: "Defensives"
    type: slider
    default: 20
    min: 5
    max: 50
  pet_slot:
    label: "Preferred pet slot"
    section: "Pet"
    type: dropdown
    options:
      - {label: "Pet 1", value: 1}
      - {label: "Pet 2", value: 2}
      - {label: "Pet 3", value: 3}
      - {label: "Pet 4", value: 4}
      - {label: "Pet 5", value: 5}
    default: 1

variables:
  route_cleave: "enemies_around_target>=config.aoe_threshold"
  route_st: "enemies_around_target<config.aoe_threshold|!state.aoe"
  hopl_any_up: "buff.howl_of_the_pack_leader.up"
  tip_stack_low: "buff.tip_of_the_spear.stack<2"
  takedown_window: "(buff.takedown.up|cooldown.takedown.ready)"
  boomstick_aoe_chim_ok: "(config.boomstick_aoe_chim&enemies_around_target>=config.boomstick_aoe_chim_min_enemies)|(!config.boomstick_aoe_chim)"
  boomstick_pl_targets_ok: "enemies_around_target>=2|target.boss|target.time_to_die>27"
  boomstick_ttd_ok: "target.time_to_die=0|target.time_to_die>=config.boomstick_min_ttd|target.npcid=243208|target.boss"
  plcleave_raptor_filler_ok: "(!variable.boomstick_ttd_ok|cooldown.boomstick.remains>=action.boomstick.execute_time)"
  takedown_ttd_ok: "target.boss|target.npcid=243208|target.time_to_die=0|target.time_to_die>=config.boomstick_min_ttd"
  takedown_sync_stacks: "(talent.howl_of_the_pack_leader&((buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs))|(buff.tip_of_the_spear.stack=0&talent.twin_fangs)))|(!talent.howl_of_the_pack_leader&((buff.tip_of_the_spear.stack>0&(!talent.twin_fangs))|(buff.tip_of_the_spear.stack=0&talent.twin_fangs)))"
  boomstick_sync_hold: "talent.takedown&state.cds&variable.takedown_ttd_ok&(cooldown.boomstick.ready|cooldown.boomstick.remains<=cooldown.takedown.remains+10)&((cooldown.takedown.remains>0&cooldown.takedown.remains<=10)|(cooldown.takedown.ready&variable.takedown_sync_stacks))"
  melee_range8: "target.range<=8"
  boss_or_range8: "(target.boss|target.range<=8)"
  tip_range8_up: "buff.tip_of_the_spear.up&target.range<=8"
  boomstick_tip8_with_pl_targets: "variable.tip_range8_up&variable.boomstick_pl_targets_ok&variable.boomstick_aoe_chim_ok"
  boomstick_tip8_aoe_chim_only: "variable.tip_range8_up&variable.boomstick_aoe_chim_ok"
  kill_command_td_ping: "cooldown.takedown.remains<gcd&variable.tip_stack_low&(!talent.twin_fangs)"
  sotf_blocking: "!buff.survival_of_the_fittest.up"
  wfb_sentinels_window: "buff.tip_of_the_spear.up&(debuff.sentinels_mark.remains|cooldown.wildfire_bomb.full_recharge_time<4+gcd)"
  kc_td_rem_low_stack: "cooldown.takedown.remains&buff.tip_of_the_spear.stack<2"

lists:
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=pet
    - call_action_list,name=auto_target
    - call_action_list,name=auto_hunters_mark,if=config.auto_hunters_mark
    - return,if=player.channeling
    - call_action_list,name=interrupts,if=config.auto_interrupt
    - call_action_list,name=defensives,if=config.smart_defensives
    - call_action_list,name=lp_defensives,if=config.use_defensives
    - call_action_list,name=auto_heal
    - call_action_list,name=auto_freedom,if=config.auto_freedom_enable
    - call_action_list,name=auto_purge_enrage,if=config.auto_enrage
    - return,if=config.auto_combat.has(0)
    - return,if=config.auto_combat>=1&!auto_combat
    - return,if=target.dead|!target.attackable|!target.enemy
    - call_action_list,name=cds,if=config.use_cooldowns
    #- call_action_list,name=trinkets,if=config.use_trinkets
    - call_action_list,name=plst,if=talent.howl_of_the_pack_leader&variable.route_st
    - call_action_list,name=plcleave,if=talent.howl_of_the_pack_leader&variable.route_cleave
    - call_action_list,name=sentst,if=(!talent.howl_of_the_pack_leader)&variable.route_st
    - call_action_list,name=sentcleave,if=(!talent.howl_of_the_pack_leader)&variable.route_cleave

  pet:
    - revive_pet,range_check=none,if=pet.dead
    - call_pet_1,range_check=none,if=!pet.alive&config.pet_slot=1
    - call_pet_2,range_check=none,if=!pet.alive&config.pet_slot=2
    - call_pet_3,range_check=none,if=!pet.alive&config.pet_slot=3
    - call_pet_4,range_check=none,if=!pet.alive&config.pet_slot=4
    - call_pet_5,range_check=none,if=!pet.alive&config.pet_slot=5
    - mend_pet,range_check=none,if=pet.alive&pet.health.pct<40&pet.buff.mend_pet.down

  defensives:
    - call_action_list,name=lp_defensives

  lp_defensives:
    - survival_of_the_fittest,range_check=none,if=player.health.pct<config.sotf_hp&variable.sotf_blocking
    - exhilaration,range_check=none,if=player.health.pct<config.exhilaration_hp&variable.sotf_blocking
    - aspect_of_the_turtle,range_check=none,if=player.health.pct<config.turtle_hp&variable.sotf_blocking

  auto_purge_enrage:
    - return,if=!config.auto_enrage
    - tranquilizing_shot.mouseover,range_check=mouseover,if=mouseover.enemy&(mouseover.purgeable.enrage|mouseover.purgeable.magic)
    - tranquilizing_shot,if=target.enemy&(target.purgeable.enrage|target.purgeable.magic)

  auto_hunters_mark:
    - hunters_mark,if=nameplates.debuff.hunters_mark.count=0&((target.time_to_die>15&(target.boss|target.classification>3|target.npcid=243208)))

  auto_freedom:
    - return,if=!config.auto_freedom_enable
    - masters_call,delay=500,cycle=party,if=cycle.debuff_list.freedom.up

  interrupts:
    # Interrupts
    - muzzle,interrupt=true,if=interrupt.target.check
    - muzzle.mouseover,range_check=mouseover,interrupt=true,if=interrupt.mouseover.check
    - muzzle.focus,range_check=focus,interrupt=true,if=interrupt.focus.check
    - intimidation,interrupt=true,if=interrupt.cc.check&pet.alive&!cooldown.muzzle.ready

  cds:
    - blood_fury,if=config.use_racials&variable.takedown_window
    - ancestral_call,if=config.use_racials&variable.takedown_window
    - fireblood,if=config.use_racials&variable.takedown_window
    - berserking,if=config.use_racials&variable.takedown_window
  #  - combat_potion,if=config.use_potion&(target.time_to_die>0&target.time_to_die<25|cooldown.takedown.ready)
    - aspect_of_the_eagle,if=config.use_aspect_of_the_eagle&target.range>=10
    

  trinkets:
    #- trinket_1,if=config.use_trinkets&talent.takedown&trinket_1.usable&(cooldown.takedown.ready|cooldown.takedown.remains<=gcd*2)

  plcleave:
    - takedown,if=(buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs)|buff.tip_of_the_spear.stack<2&talent.twin_fangs)&state.cds&variable.boss_or_range8
    - kill_command,if=!prev_gcd.1.kill_command&buff.tip_of_the_spear.stack<2&variable.hopl_any_up
    - kill_command,if=!prev_gcd.1.kill_command&variable.kill_command_td_ping
    - flamefang_pitch
    - boomstick,if=variable.boomstick_tip8_with_pl_targets&fight_remains>8
    - wildfire_bomb,if=cooldown.wildfire_bomb.full_recharge_time<gcd&(!cooldown.boomstick.ready)
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(!cooldown.boomstick.ready)
    - raptor_strike,if=variable.plcleave_raptor_filler_ok&(buff.tip_of_the_spear.up|!buff.raptor_swipe.up)&(!cooldown.boomstick.ready)
    - kill_command,if=!prev_gcd.1.kill_command&variable.kc_td_rem_low_stack
    - wildfire_bomb,if=state.cds&(!cooldown.boomstick.ready)
    - kill_command,if=!prev_gcd.1.kill_command
   #- takedown,if=state.cds

  plst:
    - takedown,if=(buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs)|buff.tip_of_the_spear.stack<=1&talent.twin_fangs)&state.cds&variable.melee_range8
    - kill_command,if=!prev_gcd.1.kill_command&buff.tip_of_the_spear.stack<2&variable.hopl_any_up
    - kill_command,if=!prev_gcd.1.kill_command&variable.kill_command_td_ping
    - flamefang_pitch
    - wildfire_bomb,if=cooldown.wildfire_bomb.full_recharge_time<gcd&((talent.lethal_calibration&cooldown.wildfire_bomb.full_recharge_time<4+gcd)|!talent.lethal_calibration)&!cooldown.boomstick.ready
    - boomstick,if=variable.boomstick_tip8_with_pl_targets
    - wildfire_bomb,if=buff.tip_of_the_spear.up&(!cooldown.boomstick.ready)
    - raptor_strike,if=buff.tip_of_the_spear.up|!buff.raptor_swipe.up
    - kill_command,if=!prev_gcd.1.kill_command&variable.kc_td_rem_low_stack
    - wildfire_bomb,if=(!cooldown.boomstick.ready)
    - kill_command,if=!prev_gcd.1.kill_command
   #- takedown,if=state.cds

  sentcleave:
    - takedown,if=(buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs)|buff.tip_of_the_spear.stack<=1&talent.twin_fangs)&state.cds&variable.melee_range8
    - boomstick,if=variable.boomstick_tip8_aoe_chim_only
    - kill_command,if=buff.tip_of_the_spear.stack=0
    - takedown,if=(buff.tip_of_the_spear.stack>=2&!variable.hopl_any_up&(!talent.twin_fangs)|buff.tip_of_the_spear.stack=0&talent.twin_fangs)&state.cds&variable.boss_or_range8&variable.takedown_ttd_ok
    - boomstick,if=variable.boomstick_tip8_aoe_chim_only
    - kill_command,if=buff.tip_of_the_spear.stack=1&variable.hopl_any_up&(!talent.twin_fangs)
    - wildfire_bomb,if=talent.wildfire_shells&buff.tip_of_the_spear.up&(!debuff.sentinels_mark.remains)&cooldown.boomstick.remains<11&cooldown.boomstick.remains>1
    - wildfire_bomb,if=variable.wfb_sentinels_window
    - kill_command,if=variable.kill_command_td_ping
    - takedown,if=(buff.tip_of_the_spear.stack>=2&(!talent.twin_fangs)|buff.tip_of_the_spear.stack=0&talent.twin_fangs)&state.cds&variable.boss_or_range8
    - moonlight_chakram,if=buff.tip_of_the_spear.up
    - flamefang_pitch,if=talent.flamefang_pitch&buff.tip_of_the_spear.up
    - raptor_strike,if=(buff.tip_of_the_spear.up&buff.raptor_swipe.up)|(!buff.raptor_swipe.up)
    - takedown,if=state.cds&variable.boss_or_range8
    - kill_command

  sentst:
    - kill_command,if=buff.tip_of_the_spear.stack=0&(cooldown.takedown.remains|(!talent.twin_fangs))
    - boomstick,if=buff.tip_of_the_spear.up&(!cooldown.takedown.ready)&(!debuff.sentinels_mark.remains)&variable.boomstick_ttd_ok&(!variable.boomstick_sync_hold)&variable.melee_range8&variable.boomstick_aoe_chim_ok
    - wildfire_bomb,if=variable.wfb_sentinels_window
    - kill_command,if=variable.kill_command_td_ping
    - takedown,if=(buff.tip_of_the_spear.stack>0&(!talent.twin_fangs)|buff.tip_of_the_spear.stack=0&talent.twin_fangs)&state.cds&variable.takedown_ttd_ok&variable.boss_or_range8
    - boomstick,if=variable.boomstick_tip8_aoe_chim_only
    - moonlight_chakram,if=buff.tip_of_the_spear.up
    - flamefang_pitch
    - raptor_strike,if=buff.tip_of_the_spear.up|(!buff.raptor_swipe.up)
    - kill_command,if=cooldown.takedown.remains
    - takedown,if=state.cds&variable.takedown_ttd_ok&variable.boss_or_range8
