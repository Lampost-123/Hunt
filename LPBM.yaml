spec: 253
name: "LP - BM (Packleader)"

movement_allowed: true

config:
  aoe_threshold:
    label: "AOE threshold (Pack Leader: swap at 2 targets)"
    type: slider
    min: 2
    max: 8
    default: 2

  smart_defensives:
    section: "Defensives"
    type: checkbox
    value: true
  use_defensives:
    section: "Defensives"
    type: checkbox
    default: true

  use_bestial_wrath:
    label: "Use Bestial Wrath"
    type: checkbox
    default: true

  bestial_wrath_ttd:
    label: "Hold Bestial Wrath if TTD below (s)"
    type: slider
    min: 10
    max: 60
    default: 20

  pet_slot:
    label: "Preferred pet slot"
    type: dropdown
    options:
      - label: "Pet 1"
        value: 1
      - label: "Pet 2"
        value: 2
      - label: "Pet 3"
        value: 3
      - label: "Pet 4"
        value: 4
      - label: "Pet 5"
        value: 5
    default: 0

variables:
  use_aoe: pet.alive&pet.nearby_enemies>=2

  in_burst: buff.bestial_wrath.up
  use_bw: config.use_bestial_wrath&player.combat&(target.bypass_combat|(target.standing&(target.boss|target.time_to_die>config.bestial_wrath_ttd)))

  in_execute: target.health.pct<20

  focus_capping: focus>=90
  focus_high: focus>=80
  focus_low: focus<30

  kc_over_barbed: cooldown.kill_command.charges>cooldown.barbed_shot.charges
  barbed_2_charges: cooldown.barbed_shot.charges=2
  barbed_before_bw: cooldown.bestial_wrath.remains<3

  frenzy_refresh: buff.frenzy.remains<4.8
  frenzy_stacks: buff.frenzy.stack
lists:
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target_ranged
    - call_action_list,name=defensives,if=config.smart_defensives
    - call_action_list,name=lp_defensives,if=config.use_defensives
    - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&config.auto_combat.has(0)
    - return,if=!target.valid|target.dead|!target.attackable
    - hunters_mark,if=target.debuff.hunters_mark.down&target.exists
    - call_action_list,name=interrupts
    - call_action_list,name=cooldowns,if=!player.casting&!player.channeling
    - call_action_list,name=trinkets,if=!player.casting&!player.channeling
    - call_action_list,name=pet
    - call_action_list,name=PL_AOE,if=pet.nearby_enemies>=2
    - call_action_list,name=PL_ST,if=pet.nearby_enemies<=1



  lp_defensives:
    - survival_of_the_fittest.player,range_check=none,if=player.health.pct<65
    - exhilaration.player,range_check=none,if=player.health.pct<50&!buff.survival_of_the_fittest.up
    - aspect_of_the_turtle.player,range_check=none,if=player.health.pct<20&!buff.survival_of_the_fittest.up

  trinkets:
    - trinket_1,if=state.cds&trinket_1.ready&buff.bestial_wrath.up
    - trinket_2,if=state.cds&trinket_2.ready&buff.bestial_wrath.up

  pet:
    - call_pet_1,if=!pet.alive&config.pet_slot=1
    - call_pet_2,if=!pet.alive&config.pet_slot=2
    - call_pet_3,if=!pet.alive&config.pet_slot=3
    - call_pet_4,if=!pet.alive&config.pet_slot=4
    - call_pet_5,if=!pet.alive&config.pet_slot=5
    - revive_pet,if=pet.dead
    - mend_pet,if=pet.alive&pet.health.pct<40&pet.buff.mend_pet.down

  interrupts:
    - counter_shot,if=target.casting.interruptible
    - intimidation,if=target.casting.interruptible&!cooldown.counter_shot.ready

  cooldowns:
    - bestial_wrath,if=player.combat&var.use_bw&cooldown.bestial_wrath.ready

  PL_ST:
    - bestial_wrath,if=cooldown.bestial_wrath.ready&cooldown.barbed_shot.charges<1
    - kill_command,if=pet.alive&buff.bestial_wrath.up&buff.natures_ally.up&usable.kill_command
    - kill_command,if=pet.alive&usable.kill_command&buff.natures_ally.up
    - barbed_shot,if=cooldown.barbed_shot.ready
    - cobra_shot

  PL_AOE:
    - wild_thrash,if=usable.wild_thrash
    - bestial_wrath,if=cooldown.bestial_wrath.ready&cooldown.barbed_shot.charges<1
    - kill_command,if=pet.alive&buff.bestial_wrath.up&usable.kill_command
    - kill_command,if=pet.alive&usable.kill_command&(cooldown.wild_thrash.remains>2|focus>=65)
    - barbed_shot,if=cooldown.barbed_shot.ready
    - cobra_shot,if=active_enemies=2&buff.hogstrider.up&cooldown.wild_thrash.remains>1.25&(cooldown.wild_thrash.remains>2|focus>=35)
    - cobra_shot,if=cooldown.wild_thrash.remains>1.25&(cooldown.wild_thrash.remains>2|focus>=35)

