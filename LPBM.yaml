version: "2.0"
spec: 253
name: "LPz - BM (SimC midnight default)"
description: "BM Hunter — SimC midnight hunter_beast_mastery.simc (APL parity)"
author: "LP"
entry: main

movement_allowed: true

config:
  smart_defensives:
    section: "Defensives"
    type: checkbox
    value: true
  use_defensives:
    section: "Defensives"
    type: checkbox
    default: true

  pet_slot:
    label: "Preferred pet slot (summon_pet / call pet)"
    type: dropdown
    options: [{label: "Pet 1", value: 1}, {label: "Pet 2", value: 2}, {label: "Pet 3", value: 3}, {label: "Pet 4", value: 4}, {label: "Pet 5", value: 5}]
    default: 1

  bw_min_fight_remains:
    section: "Cooldowns"
    label: "Min fight time left to cast Bestial Wrath (sec, 0 = no check)"
    type: slider
    min: 0
    max: 90
    value: 15

variables:
  
  route_cleave: (pet.nearby_enemies>1)&state.aoe
  route_st: pet.nearby_enemies<=1|!state.aoe
  bw_fight_ok: config.bw_min_fight_remains=0|fight_remains>config.bw_min_fight_remains

lists:
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=pet
    - call_action_list,name=auto_target
    - call_action_list,name=interrupts
    - call_action_list,name=auto_heal
    - call_action_list,name=defensives,if=config.smart_defensives
    - call_action_list,name=lp_defensives,if=config.use_defensives
    - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&config.auto_combat.has(0)
    - return,if=!target.valid|target.dead|!target.attackable
    - call_action_list,name=cooldowns,if=state.cds
    - call_action_list,name=trinkets,if=state.cds
    - return,if=state.cds&trinket_1.cd<1
    - call_action_list,name=drst,if=talent.black_arrow.enabled&var.route_st
    - call_action_list,name=drcleave,if=talent.black_arrow.enabled&var.route_cleave
    - call_action_list,name=st,if=!talent.black_arrow.enabled&var.route_st
    - call_action_list,name=cleave,if=!talent.black_arrow.enabled&var.route_cleave

  defensives:
    - call_action_list,name=lp_defensives

  lp_defensives:
    - survival_of_the_fittest.player,range_check=none,if=player.health.pct<65&!buff.survival_of_the_fittest.up
    - exhilaration.player,range_check=none,if=player.health.pct<50&!buff.survival_of_the_fittest.up
    - aspect_of_the_turtle.player,range_check=none,if=player.health.pct<20&!buff.survival_of_the_fittest.up

  pet:
    - revive_pet,range_check=none,if=pet.dead
    - call_pet_1,range_check=none,if=!pet.alive&config.pet_slot=1
    - call_pet_2,range_check=none,if=!pet.alive&config.pet_slot=2
    - call_pet_3,range_check=none,if=!pet.alive&config.pet_slot=3
    - call_pet_4,range_check=none,if=!pet.alive&config.pet_slot=4
    - call_pet_5,range_check=none,if=!pet.alive&config.pet_slot=5
    - mend_pet,range_check=none,if=pet.alive&pet.health.pct<40&pet.buff.mend_pet.down

  interrupts:
    - counter_shot,if=interrupts.target.ready
    - counter_shot.focus,if=interrupts.focus.ready
    - counter_shot.mouseover,if=interrupts.mouseover.ready
    - counter_shot,if=interrupts.40y.ready
    - intimidation,if=interrupts.target.ready&pet.alive&!cooldown.counter_shot.ready
    - intimidation,if=interrupts.target.stun.ready&pet.alive

  
  cooldowns:
    - berserking,if=cooldown.bestial_wrath.ready|fight_remains<13
    - blood_fury,if=cooldown.bestial_wrath.ready|fight_remains<16
    - ancestral_call,if=cooldown.bestial_wrath.ready|fight_remains<16
    - fireblood,if=cooldown.bestial_wrath.ready|fight_remains<9
    #- combat_potion,if=cooldown.bestial_wrath.ready|fight_remains<31

 
  trinkets:
    #- use_item,name=algethar_puzzle_box,if=state.cds&(cooldown.bestial_wrath.remains<2|cooldown.bestial_wrath.ready)
    - trinket_1,if=trinket_1.ready&(cooldown.bestial_wrath.remains<2|cooldown.bestial_wrath.ready)
    # - trinket_2,if=trinket_2.ready&state.cds&(cooldown.bestial_wrath.remains<2|cooldown.bestial_wrath.ready)

  
  st:
    - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
    - bestial_wrath,if=var.bw_fight_ok
    - wild_thrash,if=pet.nearby_enemies>1
    
    - kill_command,if=(((state.cds&((cooldown.bestial_wrath.remains>cooldown.kill_command.full_recharge_time+gcd)|cooldown.bestial_wrath.ready))|!state.cds)&(buff.natures_ally.up|howl_summon.ready))
    - barbed_shot
    - cobra_shot

  
  cleave:
    - barbed_shot,if=cooldown.bestial_wrath.remains<gcd
    - wild_thrash,if=talent.beast_cleave&pet.nearby_enemies>=1
    - bestial_wrath,if=(pet.nearby_enemies>=1)&buff.bestial_wrath.down&trinket_1.cd>10
    - wild_thrash,if=(pet.nearby_enemies>=1) 
    - kill_command 
    - cobra_shot,if=cooldown.wild_thrash.remains>gcd&buff.hogstrider.up&pet.nearby_enemies<4
    - barbed_shot
    - cobra_shot,if=(talent.beast_cleave&cooldown.wild_thrash.remains>gcd)

  
  drst:
    - bestial_wrath,if=state.cds&(pet.nearby_enemies>=1)&buff.bestial_wrath.down&combat.time>1.4&trinket_1.cd>10&!trinket_1.ready
    - wailing_arrow,ignore_cooldown=true,if=buff.withering_fire.remains<=2&buff.bestial_wrath.up&!player.moving
    - kill_command,if=buff.natures_ally.up
    - black_arrow,if=buff.withering_fire.remains<=gcd|buff.withering_fire.up&buff.natures_ally.down|prev_gcd.1.wailing_arrow
    - barbed_shot,if=state.cds&cooldown.bestial_wrath.remains<2*gcd
    - black_arrow,if=buff.withering_fire.up
    - cobra_shot,if=talent.killer_cobra&buff.bestial_wrath.up&cooldown.barbed_shot.charges_fractional<1.4
    - barbed_shot
    - black_arrow
    - wailing_arrow,ignore_cooldown=true,if=buff.bestial_wrath.up&!player.moving
    - cobra_shot,if=cooldown.kill_command.remains>gcd|buff.natures_ally.down

  
  drcleave:
    - wailing_arrow,ignore_cooldown=true,if=buff.withering_fire.remains<2&buff.bestial_wrath.up&!player.moving
    - black_arrow,if=buff.withering_fire.remains<=gcd|prev_gcd.1.wailing_arrow
    - wild_thrash,if=(pet.nearby_enemies>1)&combat.time>1.4
    - bestial_wrath,if=state.cds&buff.beast_cleave.remains>gcd&pet.nearby_enemies>1&buff.bestial_wrath.down&combat.time>1.4&trinket_1.cd>10&!trinket_1.ready
    - kill_command,if=buff.natures_ally.up&buff.beast_cleave.up&!(state.cds&cooldown.bestial_wrath.remains<4&cooldown.kill_command.charges_fractional<2)
    - barbed_shot,if=cooldown.barbed_shot.full_recharge_time<gcd
    - black_arrow,if=buff.withering_fire.up
    - barbed_shot
    - black_arrow
    - wailing_arrow,ignore_cooldown=true,if=buff.bestial_wrath.up&!player.moving
    - cobra_shot,if=cooldown.wild_thrash.remains>gcd|buff.natures_ally.down