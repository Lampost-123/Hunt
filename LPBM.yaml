version: "1.0.0"
spec: 253
name: "LP - BM (Pack Leader / Dark Ranger)"
description: "BM Hunter with Pack Leader  Dark Ranger support (BMROTA)"
author: "LP"
entry: main

movement_allowed: true

config:


  aoe_threshold:
    label: "AOE threshold (Pack Leader: swap at 2 targets)"
    type: slider
    min: 2
    max: 8
    default: 2

  smart_defensives:
    section: "Defensives"
    type: checkbox
    value: true
  use_defensives:
    section: "Defensives"
    type: checkbox
    default: true

  use_bestial_wrath:
    label: "Use Bestial Wrath"
    type: checkbox
    default: true

  bestial_wrath_ttd:
    label: "Hold Bestial Wrath if TTD below (s)"
    type: slider
    min: 10
    max: 60
    default: 20

  pet_slot:
    label: "Preferred pet slot"
    type: dropdown
    options:
      - label: "Pet 1"
        value: 1
      - label: "Pet 2"
        value: 2
      - label: "Pet 3"
        value: 3
      - label: "Pet 4"
        value: 4
      - label: "Pet 5"
        value: 5
    default: 0

variables:
  is_packleader: "!talent.black_arrow.enabled"
  is_dark_ranger: talent.black_arrow.enabled

  use_aoe: pet.alive&pet.nearby_enemies>=2

  in_burst: buff.bestial_wrath.up

  in_execute: target.health.pct<20

  focus_capping: focus>=90
  focus_high: focus>=80
  focus_low: focus<30

  frenzy_refresh: buff.frenzy.remains<4.8
  frenzy_stacks: buff.frenzy.stack
lists:
  main:
    - call_action_list,name=spell_queue
    - call_action_list,name=sanity_checks
    - call_action_list,name=auto_target
    - call_action_list,name=interrupts
    - call_action_list,name=pet,if=!pet.alive
    - mend_pet,if=pet.alive&pet.health.pct<40&pet.buff.mend_pet.down
    - call_action_list,name=defensives,if=config.smart_defensives
    - call_action_list,name=lp_defensives,if=config.use_defensives
    - return,if=!target.valid&!((config.auto_combat.has(1)&target.quest_mob&target.enemy&!target.dead)|(config.auto_combat.has(2)&target.combat&target.enemy&!target.dead)|(config.auto_combat.has(3)&target.targeting_party&target.enemy&!target.dead))
    - return,if=!target.valid&config.auto_combat.has(0)
    - return,if=!target.valid|target.dead|!target.attackable
    - hunters_mark,if=target.debuff.hunters_mark.down&target.exists
    - call_action_list,name=trinkets,if=!player.casting&!player.channeling
    - call_action_list,name=dark_ranger_st,if=var.is_dark_ranger&(active_enemies<2|!talent.beast_cleave&active_enemies<3)
    - call_action_list,name=dark_ranger_aoe,if=var.is_dark_ranger&(active_enemies>2|talent.beast_cleave&active_enemies>1)
    - call_action_list,name=pack_leader_st,if=var.is_packleader&(active_enemies<2|!talent.beast_cleave&active_enemies<3)
    - call_action_list,name=pack_leader_aoe,if=var.is_packleader&(active_enemies>2|talent.beast_cleave&active_enemies>1)

  defensives:
    - call_action_list,name=lp_defensives

  lp_defensives:
    - survival_of_the_fittest.player,range_check=none,if=player.health.pct<65&!buff.survival_of_the_fittest.up
    - exhilaration.player,range_check=none,if=player.health.pct<50&!buff.survival_of_the_fittest.up
    - aspect_of_the_turtle.player,range_check=none,if=player.health.pct<20&!buff.survival_of_the_fittest.up

  trinkets:
    - trinket_1,if=state.cds&trinket_1.ready&buff.bestial_wrath.up&!player.casting&!player.channeling
    - trinket_2,if=state.cds&trinket_2.ready&buff.bestial_wrath.up&!player.casting&!player.channeling

  pet:
    - revive_pet,if=pet.dead
    - call_pet_1,if=!pet.alive&config.pet_slot=1
    - call_pet_2,if=!pet.alive&config.pet_slot=2
    - call_pet_3,if=!pet.alive&config.pet_slot=3
    - call_pet_4,if=!pet.alive&config.pet_slot=4
    - call_pet_5,if=!pet.alive&config.pet_slot=5
    - mend_pet,if=pet.alive&pet.health.pct<40&pet.buff.mend_pet.down

  interrupts:
    - counter_shot,if=interrupts.target.ready
    - counter_shot.focus,if=interrupts.focus.ready
    - counter_shot.mouseover,if=interrupts.mouseover.ready
    - counter_shot,if=interrupts.40y.ready
    - intimidation,if=interrupts.target.ready&pet.alive&!cooldown.counter_shot.ready
    - intimidation,if=interrupts.target.stun.ready&pet.alive

  cooldowns:
    - barbed_shot,if=state.cds&cooldown.bestial_wrath.ready&cooldown.barbed_shot.charges>=1&cooldown.barbed_shot.ready

  pack_leader_st:
    - barbed_shot,if=state.cds&cooldown.bestial_wrath.remains<gcd
    - bestial_wrath,if=state.cds
    - kill_command,if=pet.alive&usable.kill_command&buff.natures_ally.up
    - barbed_shot,if=cooldown.barbed_shot.ready
    - cobra_shot

  pack_leader_aoe:
    - barbed_shot,if=state.cds&cooldown.bestial_wrath.remains<gcd
    - wild_thrash,if=usable.wild_thrash
    - bestial_wrath,if=state.cds
    - kill_command,if=pet.alive&usable.kill_command
    - cobra_shot,if=cooldown.wild_thrash.remains>gcd&talent.hogstrider&buff.hogstrider.up&active_enemies<4
    - barbed_shot,if=cooldown.barbed_shot.ready
    - cobra_shot,if=cooldown.wild_thrash.remains>gcd

  dark_ranger_st:
    - wailing_arrow,override=bestial_wrath,if=buff.withering_fire.remains<action.wailing_arrow.execute_time+gcd|fight_remains<action.wailing_arrow.execute_time+gcd
    - bestial_wrath,if=state.cds
    - kill_command,if=pet.alive&usable.kill_command&buff.natures_ally.up
    - black_arrow,if=buff.withering_fire.up
    - barbed_shot,if=cooldown.barbed_shot.ready
    - black_arrow
    - cobra_shot

  dark_ranger_aoe:
    - wailing_arrow,override=bestial_wrath,if=buff.bestial_wrath.remains<action.wailing_arrow.execute_time+gcd|fight_remains<action.wailing_arrow.execute_time+gcd
    - black_arrow,if=buff.beast_cleave.remains<gcd
    - bestial_wrath,if=state.cds&cooldown.bestial_wrath.ready
    - wild_thrash,if=usable.wild_thrash
    - kill_command,if=pet.alive&buff.natures_ally.up&usable.kill_command
    - black_arrow,if=buff.withering_fire.up
    - barbed_shot,if=cooldown.barbed_shot.ready
    - wailing_arrow,override=bestial_wrath,if=buff.wailing_arrow.up
    - black_arrow
    - cobra_shot,if=cooldown.wild_thrash.remains>gcd
